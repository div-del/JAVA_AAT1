<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CollegeFixIt — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">🔧</span>
      <h1>CollegeFixIt</h1>
      <p>Students report problems. Admin fixes them.</p>
    </div>

    <!-- Tab Toggle -->
    <div class="auth-tabs">
      <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
      <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@college.edu" required />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <div id="loginError" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary" id="loginBtn">
        <span class="btn-text">Login</span>
        <span class="btn-loader hidden">⏳</span>
      </button>
    </form>

    <!-- Register Form -->
    <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="you@college.edu" required />
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="••••••••" required minlength="6" />
      </div>
      <div class="form-group">
        <label for="regRole">Role</label>
        <select id="regRole" required>
          <option value="">-- Select Role --</option>
          <option value="student">Student</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div id="registerError" class="error-msg hidden"></div>
      <div id="registerSuccess" class="success-msg hidden"></div>
      <button type="submit" class="btn-primary" id="registerBtn">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader hidden">⏳</span>
      </button>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
